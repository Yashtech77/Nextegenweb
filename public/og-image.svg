<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#050B18"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#bg-grad)" opacity="0.4"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="64" height="64" rx="16" fill="url(#logo-grad)"/>
  <path d="M112 96L96 120H112L100 140L128 116H112L124 96H112Z" fill="white" fill-opacity="0.95"/>

  <!-- Brand name -->
  <text x="160" y="126" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="white">NextGenWebWorks</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="Inter, sans-serif" font-size="64" font-weight="900" fill="white">Building the Next</text>
  <text x="80" y="360" font-family="Inter, sans-serif" font-size="64" font-weight="900" fill="url(#text-grad)">Generation</text>
  <text x="480" y="360" font-family="Inter, sans-serif" font-size="64" font-weight="900" fill="white"> of Digital</text>
  <text x="80" y="440" font-family="Inter, sans-serif" font-size="64" font-weight="900" fill="white">Products</text>

  <!-- Subtitle -->
  <text x="80" y="510" font-family="Inter, sans-serif" font-size="24" fill="#94A3B8">Premium web apps, mobile apps, and SaaS products for startups</text>

  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="80" y1="80" x2="144" y2="144" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="80" y1="360" x2="600" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
</svg>
